<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실시간 광림청장 애찬 메뉴 선택!</title>
  <!-- Google Fonts 구글 폰트 적용 -->
  <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #ff7b93;
      --secondary-color: #ffeb3b;
      --bg-color: #fff9f9;
      --card-bg: #ffffff;
      --text-color: #4a4a4a;
      --accent-color: #4ecdc4;
      --edit-color: #ff9f43;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans KR', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 10px;
    }

    /* 모바일 최적화 컨테이너 */
    .app-container {
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      border-radius: 30px;
      box-shadow: 0 15px 30px rgba(255, 123, 147, 0.15);
      overflow: hidden;
      border: 4px solid #ffe3e8;
      position: relative;
    }

    /* 1. 헤더 (사진.jpg 배경 및 웰컴 메시지) */
    .hero-header {
      width: 100%;
      height: 220px;
      background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.4)), url('사진.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      color: #fff;
    }

    .hero-header h1 {
      font-family: 'Gamja Flower', cursive;
      font-size: 2.2rem;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
      word-break: keep-all;
      line-height: 1.3;
      color: var(--secondary-color);
    }

    .hero-header p {
      font-size: 1.1rem;
      font-weight: 700;
      margin-top: 10px;
      text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.8);
      background: rgba(255, 123, 147, 0.8);
      padding: 5px 15px;
      border-radius: 20px;
    }

    /* 섹션 스타일 */
    .section {
      padding: 20px;
      border-bottom: 2px dashed #ffe3e8;
    }

    .section-title {
      font-size: 1.25rem;
      font-weight: 900;
      color: var(--primary-color);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 공통 폼 스타일 */
    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 5px;
      color: #888;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #ffd1d9;
      border-radius: 15px;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
      background-color: #fffcfc;
    }

    input:focus, select:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 8px rgba(255, 123, 147, 0.2);
    }

    .btn {
      width: 100%;
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 15px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, background-color 0.2s;
      box-shadow: 0 5px 10px rgba(255, 123, 147, 0.3);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: var(--accent-color);
      box-shadow: 0 5px 10px rgba(78, 205, 196, 0.3);
    }

    /* 관리자 권한 토글 버튼 */
    .admin-toggle {
      background: #f1f1f1;
      color: #666;
      text-align: center;
      padding: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 700;
    }

    .admin-panel {
      display: none;
      background: #fff5f6;
      border-radius: 15px;
      padding: 15px;
      margin-top: 10px;
      border: 2px solid #ffd1d9;
    }

    .admin-auth-box {
      display: none;
      margin-top: 10px;
      padding: 12px;
      border: 2px solid #ffd1d9;
      border-radius: 15px;
      background: #fff;
    }

    .menu-item-row {
      display: flex;
      gap: 5px;
      margin-bottom: 5px;
    }

    /* 마감 타이머 */
    .timer-display {
      background: #fff;
      border: 2px solid var(--primary-color);
      padding: 8px;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
      color: var(--primary-color);
      margin-bottom: 10px;
    }

    /* 취합 테이블 */
    .table-container {
      overflow-x: auto;
      margin-top: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      text-align: center;
    }

    th {
      background-color: #ffd1d9;
      color: var(--text-color);
      font-weight: 700;
      padding: 10px 4px;
    }

    td {
      padding: 10px 4px;
      border-bottom: 1px solid #ffe3e8;
    }

    tr:nth-child(even) td {
      background-color: #fffcfc;
    }

    .total-row {
      background-color: #ffe3e8 !important;
      font-weight: bold;
      color: var(--primary-color);
    }

    /* 수정/삭제 아이콘 버튼 */
    .action-btn {
      border: none;
      background: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 5px;
      transition: transform 0.1s;
    }

    .action-btn:active {
      transform: scale(1.3);
    }

    /* 폭죽용 캔버스 */
    #confettiCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 999;
    }

    @media (max-width: 360px) {
      .hero-header h1 { font-size: 1.8rem; }
      .roulette-container { width: 240px; height: 240px; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- 1. 헤더 -->
    <div class="hero-header">
      <h1>메뉴를 선택해주세요.<br>늘 기대가 가득한 애찬! ☕️</h1>
      <p>미리 정산하면 픽업이 빨라요~</p>
    </div>

    <!-- 관리자 모드 토글 -->
    <div class="admin-toggle" onclick="toggleAdminPanel()">⚙️ 관리자 설정 열기/닫기</div>

    <div class="admin-auth-box" id="adminAuthBox">
      <label style="display:block; margin-bottom:8px; font-weight:700; color:#666;">🔐 관리자 비밀번호</label>
      <input type="password" id="adminPassword" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter') checkAdminAccess()">
      <button class="btn btn-secondary" onclick="checkAdminAccess()" style="margin-top:8px; padding:8px; font-size:0.9rem;">확인</button>
    </div>
    
    <!-- 3. 관리자 권한 섹션 -->
    <div class="admin-panel" id="adminPanel">
      <div class="section-title">🛠️ 관리자 설정</div>
      
      <div class="form-group">
        <label>⏱️ 주문 마감 시간 설정</label>
        <input type="datetime-local" id="deadlineTime" onchange="setDeadline()">
      </div>

      <div class="form-group">
        <label>➕ 신규 메뉴 추가</label>
        <div class="menu-item-row">
          <input type="text" id="newMenuName" placeholder="메뉴명 (예: 햄버거)">
          <input type="number" id="newMenuPrice" placeholder="가격 (원)" style="width: 120px;">
        </div>
        <button class="btn btn-secondary" onclick="addNewMenu()" style="padding: 8px; font-size: 0.9rem;">메뉴 추가</button>
      </div>

      <div class="form-group" style="margin-top: 15px;">
        <label>📋 등록된 메뉴 목록 (가격 수정 가능)</label>
        <div id="adminMenuList"></div>
      </div>
      
      <button class="btn btn-secondary" onclick="resetAllData()" style="background:#ff4757; margin-top:10px;">데이터 전체 초기화 🧹</button>
    </div>

    <!-- 주문 마감 시간 표시기 -->
    <div class="section" style="padding-bottom: 0;">
      <div class="timer-display" id="timerDisplay">⏳ 주문 진행 중... 원하시는 메뉴를 담아주세요!</div>
    </div>

    <!-- 4. 주문자 입력 섹션 -->
    <div class="section" id="orderFormSection">
      <div class="section-title" id="formTitle">✏️ 메뉴 주문하기</div>
      
      <div class="form-group">
        <label>주문자 이름</label>
        <input type="text" id="ordererName" placeholder="이름을 입력해 주세요">
      </div>

      <div class="form-group">
        <label>메뉴 선택</label>
        <select id="drinkSelect"></select>
      </div>

      <div class="form-group">
        <label>수량</label>
        <select id="drinkQty">
          <option value="1">1개</option>
          <option value="2">2개</option>
          <option value="3">3개</option>
          <option value="4">4개</option>
          <option value="5">5개</option>
        </select>
      </div>

      <div style="display: flex; gap: 8px;">
        <button class="btn" id="submitBtn" onclick="submitOrder()" style="flex: 1;">주문 추가하기 🥳</button>
        <button class="btn" id="cancelEditBtn" onclick="cancelEdit()" style="display: none; background: #a4b0be; box-shadow: 0 5px 10px rgba(164,176,190,0.3); width: 80px;">취소</button>
      </div>
    </div>

    <!-- 6. 주문 현황 및 취합 테이블 -->
    <div class="section">
      <div class="section-title">📊 실시간 주문 현황</div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>주문자</th>
              <th>메뉴</th>
              <th>단가</th>
              <th>수량</th>
              <th>금액</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="orderTableBody">
            <!-- 주문 데이터 동적 삽입 -->
          </tbody>
          <tfoot>
            <tr class="total-row" id="totalRow">
              <td colspan="3">합계</td>
              <td id="totalQty">0</td>
              <td id="totalAmount" colspan="2">0원</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>

  </div>

  <!-- Firebase 및 앱 로직 스크립트 -->
  <script type="module">
    // Firebase SDK CDN 가져오기 (v10)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // ----------------- [ 중요! 여기에 복사한 Firebase 설정을 붙여넣으세요 ] -----------------
    const firebaseConfig = {
      apiKey: "AIzaSyBExGF7F33BWyeH3g8D-KUhCdPS2o7gaA4",
      authDomain: "coffee-lottery-36117.firebaseapp.com",
      databaseURL: "https://coffee-lottery-36117-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "coffee-lottery-36117",
      storageBucket: "coffee-lottery-36117.firebasestorage.app",
      messagingSenderId: "347979859384",
      appId: "1:347979859384:web:49a2d33a2e8cd22b12bb4d"
    };
    // ----------------------------------------------------------------------------------

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- 앱 상태 전역 변수 ---
    let menus = [];
    let orders = [];
    let deadlineStr = null;
    let timerInterval = null;
    let editingOrderId = null; 

    // --- 데이터 실시간 동기화 (Firebase -> Client) ---

    // 1. 메뉴 목록 실시간 감지 및 최초 초기화
    const menusRef = ref(db, 'menus');
    onValue(menusRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        // DB에 메뉴 데이터가 아예 없을 때 디폴트 데이터 주입
        const defaultMenus = {
          1: { id: 1, name: "일반김밥", price: 3500 },
          2: { id: 2, name: "돈까스김밥", price: 5500 },
          3: { id: 3, name: "치킨마요", price: 3900 },
          4: { id: 4, name: "왕치킨마요", price: 5600 }
        };
        set(menusRef, defaultMenus);
        menus = Object.values(defaultMenus);
      } else {
        menus = Object.values(data);
      }
      renderMenuOptions();
      renderAdminMenuList();
      renderOrders(); 
    });

    // 2. 주문 내역 실시간 감지
    const ordersRef = ref(db, 'orders');
    onValue(ordersRef, (snapshot) => {
      const data = snapshot.val();
      if (data) {
        orders = Object.keys(data).map(key => ({ id: key, ...data[key] }));
      } else {
        orders = [];
      }
      renderOrders();
    });

    // 3. 마감 시간 실시간 감지
    const deadlineRef = ref(db, 'deadline');
    onValue(deadlineRef, (snapshot) => {
      deadlineStr = snapshot.val();
      if (deadlineStr) {
        document.getElementById('deadlineTime').value = deadlineStr;
        startTimer();
      } else {
        document.getElementById('deadlineTime').value = '';
        document.getElementById('timerDisplay').innerHTML = "⏳ 주문 진행 중... 원하시는 메뉴를 담아주세요!";
        document.getElementById('timerDisplay').style.background = "#fff";
        document.getElementById('timerDisplay').style.color = "var(--primary-color)";
        if(timerInterval) clearInterval(timerInterval);
      }
      updateOrderFormState();
    });

    // --- UI 랜더링 함수들 ---

    function toggleAdminPanel() {
      const panel = document.getElementById('adminPanel');
      const authBox = document.getElementById('adminAuthBox');
      const isOpen = panel.style.display === 'block';

      panel.style.display = 'none';
      authBox.style.display = isOpen ? 'none' : 'block';
      document.getElementById('adminPassword').value = '';
    }

    function checkAdminAccess() {
      const password = document.getElementById('adminPassword').value;
      const correctPassword = '3040';

      if (password === correctPassword) {
        document.getElementById('adminAuthBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
      } else {
        alert('관리자 비밀번호가 올바르지 않습니다.');
      }
    }

    function renderMenuOptions() {
      const select = document.getElementById('drinkSelect');
      select.innerHTML = '';
      menus.forEach(menu => {
        const option = document.createElement('option');
        option.value = menu.id;
        option.textContent = `${menu.name} (${menu.price.toLocaleString()}원)`;
        select.appendChild(option);
      });
    }

    function renderAdminMenuList() {
      const container = document.getElementById('adminMenuList');
      container.innerHTML = '';
      menus.forEach((menu) => {
        const div = document.createElement('div');
        div.className = 'menu-item-row';
        div.innerHTML = `
          <input type="text" value="${menu.name}" onchange="updateMenuName(${menu.id}, this.value)" style="flex:2; padding: 6px 10px;">
          <input type="number" value="${menu.price}" onchange="updateMenuPrice(${menu.id}, this.value)" style="flex:1; padding: 6px 10px;">
          <button class="btn btn-secondary" onclick="deleteMenu(${menu.id})" style="width:50px; padding:6px; background:#ff4757;">삭제</button>
        `;
        container.appendChild(div);
      });
    }

    function isOrderClosed() {
      if (!deadlineStr) return false;
      const now = new Date();
      const deadline = new Date(deadlineStr);
      if (isNaN(deadline.getTime())) return false;
      return now >= deadline;
    }

    function updateOrderFormState() {
      const isClosed = isOrderClosed();
      const nameInput = document.getElementById('ordererName');
      const drinkSelect = document.getElementById('drinkSelect');
      const qtySelect = document.getElementById('drinkQty');
      const submitBtn = document.getElementById('submitBtn');
      const cancelEditBtn = document.getElementById('cancelEditBtn');

      nameInput.disabled = isClosed;
      drinkSelect.disabled = isClosed;
      qtySelect.disabled = isClosed;
      submitBtn.disabled = isClosed;
      cancelEditBtn.disabled = isClosed;

      if (isClosed) {
        if (editingOrderId !== null) {
          cancelEdit();
        }
        submitBtn.textContent = "주문 마감";
        submitBtn.style.background = "#95a5a6";
        submitBtn.style.boxShadow = "none";
        cancelEditBtn.style.display = "none";
      } else if (editingOrderId !== null) {
        submitBtn.textContent = "주문 수정 완료 💾";
        submitBtn.style.background = "var(--edit-color)";
        submitBtn.style.boxShadow = "0 5px 10px rgba(255, 159, 67, 0.3)";
      } else {
        submitBtn.textContent = "주문 추가하기 🥳";
        submitBtn.style.background = "var(--primary-color)";
        submitBtn.style.boxShadow = "0 5px 10px rgba(255, 123, 147, 0.3)";
      }
    }

    function renderOrders() {
      const tbody = document.getElementById('orderTableBody');
      tbody.innerHTML = '';

      let totalQty = 0;
      let totalAmt = 0;
      const isClosed = isOrderClosed();

      orders.forEach(order => {
        const menu = menus.find(m => m.id === parseInt(order.drinkId)) || { name: '삭제된 메뉴', price: 0 };
        const sumPrice = menu.price * order.qty;

        totalQty += order.qty;
        totalAmt += sumPrice;

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>${order.name}</strong></td>
          <td>${menu.name}</td>
          <td>${menu.price.toLocaleString()}원</td>
          <td>${order.qty}</td>
          <td><strong>${sumPrice.toLocaleString()}원</strong></td>
          <td>
            ${isClosed ? '<button class="action-btn" disabled title="주문 마감으로 수정 불가">✏️</button>' : `<button class="action-btn" onclick="startEditOrder('${order.id}')" title="수정">✏️</button>`}
            ${isClosed ? '<button class="action-btn" disabled title="주문 마감으로 삭제 불가">❌</button>' : `<button class="action-btn" onclick="deleteOrder('${order.id}')" title="삭제">❌</button>`}
          </td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('totalQty').textContent = totalQty;
      document.getElementById('totalAmount').textContent = totalAmt.toLocaleString() + '원';
      updateOrderFormState();
    }


    // --- 메뉴 관리 DB 전송 함수 ---

    function addNewMenu() {
      const nameInput = document.getElementById('newMenuName');
      const priceInput = document.getElementById('newMenuPrice');
      const name = nameInput.value.trim();
      const price = parseInt(priceInput.value);

      if(!name || isNaN(price)) {
        alert('올바른 메뉴명과 가격을 입력해 주세요.');
        return;
      }

      const newId = menus.length > 0 ? Math.max(...menus.map(m => m.id)) + 1 : 1;
      set(ref(db, `menus/${newId}`), { id: newId, name, price });

      nameInput.value = '';
      priceInput.value = '';
    }

    function updateMenuName(id, newName) {
      update(ref(db, `menus/${id}`), { name: newName });
    }

    function updateMenuPrice(id, newPrice) {
      const price = parseInt(newPrice) || 0;
      update(ref(db, `menus/${id}`), { price: price });
    }

    function deleteMenu(id) {
      remove(ref(db, `menus/${id}`));
    }


    // --- 마감 시간 처리 ---

    function setDeadline() {
      const timeVal = document.getElementById('deadlineTime').value;
      set(ref(db, 'deadline'), timeVal);
    }

    function startTimer() {
      if(timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 1000);
      updateTimer();
    }

    function updateTimer() {
      if(!deadlineStr) return;
      const now = new Date();
      const deadline = new Date(deadlineStr);
      const display = document.getElementById('timerDisplay');

      if (isNaN(deadline.getTime())) {
        display.innerHTML = "⏳ 주문 마감 시간을 설정해주세요!";
        display.style.background = "#fff";
        display.style.color = "var(--primary-color)";
        return;
      }

      if (deadline < now) {
        clearInterval(timerInterval);
        display.innerHTML = "🚨 주문이 마감되었습니다! 주문 정리를 마무리해주세요!";
        display.style.background = "#ff4757";
        display.style.color = "#fff";
        return;
      }

      const diff = deadline - now;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const mins = Math.floor((diff / (1000 * 60)) % 60);
      const secs = Math.floor((diff / 1000) % 60);

      display.innerHTML = `⏱️ 마감까지 남은 시간: <strong>${days}일 ${hours}시간 ${mins}분 ${secs}초</strong>`;
      display.style.background = "#fff9db";
      display.style.color = "#f59f00";
    }


    // --- 주문 등록 및 수정/삭제 DB 반영 ---

    function submitOrder() {
      if (isOrderClosed()) {
        alert("주문 마감 시간이 지나 주문 변경이 불가능합니다.");
        return;
      }

      const nameInput = document.getElementById('ordererName');
      const drinkSelect = document.getElementById('drinkSelect');
      const qtySelect = document.getElementById('drinkQty');

      const name = nameInput.value.trim();
      const menuId = parseInt(drinkSelect.value);
      const qty = parseInt(qtySelect.value);

      if(!name) {
        alert('주문자 이름을 입력해주세요!');
        return;
      }

      if (editingOrderId !== null) {
        // [수정 모드] 기존 DB 데이터 업데이트
        update(ref(db, `orders/${editingOrderId}`), {
          name: name,
          drinkId: menuId,
          qty: qty
        });
        cancelEdit();
      } else {
        // [추가 모드] 동일 주문자+동일 메뉴가 있다면 합산, 아니면 새로 push
        const existingOrder = orders.find(o => o.name === name && o.drinkId === menuId);
        if(existingOrder) {
          update(ref(db, `orders/${existingOrder.id}`), {
            qty: existingOrder.qty + qty
          });
        } else {
          const newOrderRef = push(ref(db, 'orders'));
          set(newOrderRef, {
            name,
            drinkId: menuId,
            qty
          });
        }
      }

      nameInput.value = '';
    }

    function startEditOrder(id) {
      if (isOrderClosed()) {
        alert("주문 마감 시간이 지나 주문 수정이 불가능합니다.");
        return;
      }

      const order = orders.find(o => o.id === id);
      if(!order) return;

      editingOrderId = id;

      document.getElementById('ordererName').value = order.name;
      document.getElementById('drinkSelect').value = order.drinkId;
      document.getElementById('drinkQty').value = order.qty;

      document.getElementById('formTitle').textContent = "✏️ 주문 수정하기";
      document.getElementById('submitBtn').textContent = "주문 수정 완료 💾";
      document.getElementById('submitBtn').style.background = "var(--edit-color)";
      document.getElementById('cancelEditBtn').style.display = "block";

      document.getElementById('orderFormSection').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelEdit() {
      editingOrderId = null;
      document.getElementById('ordererName').value = '';
      document.getElementById('drinkSelect').selectedIndex = 0;
      document.getElementById('drinkQty').value = '1';

      document.getElementById('formTitle').textContent = "✏️ 메뉴 주문하기";
      document.getElementById('submitBtn').textContent = "주문 추가하기 🥳";
      document.getElementById('submitBtn').style.background = "var(--primary-color)";
      document.getElementById('cancelEditBtn').style.display = "none";
    }

    function deleteOrder(id) {
      if (isOrderClosed()) {
        alert("주문 마감 시간이 지나 주문 삭제가 불가능합니다.");
        return;
      }

      if(confirm("해당 주문을 삭제하시겠습니까?")) {
        remove(ref(db, `orders/${id}`));
        if (editingOrderId === id) {
          cancelEdit();
        }
      }
    }

    // 전체 초기화 (새 게임 시작 시)
    function resetAllData() {
      if(confirm("모든 주문, 마감 시간, 메뉴를 기본값으로 초기화하시겠습니까?")) {
        const defaultMenus = {
          1: { id: 1, name: "일반김밥", price: 3500 },
          2: { id: 2, name: "돈까스김밥", price: 5500 },
          3: { id: 3, name: "치킨마요", price: 3900 },
          4: { id: 4, name: "왕치킨마요", price: 5600 }
        };

        set(ref(db, 'menus'), defaultMenus);
        remove(ref(db, 'orders'));
        remove(ref(db, 'deadline'));
        alert("기본 메뉴와 데이터가 초기화되었습니다!");
      }
    }


    // --- HTML 엘리먼트 onclick 연동을 위한 전역 스코프 바인딩 ---
    window.toggleAdminPanel = toggleAdminPanel;
    window.checkAdminAccess = checkAdminAccess;
    window.addNewMenu = addNewMenu;
    window.updateMenuName = updateMenuName;
    window.updateMenuPrice = updateMenuPrice;
    window.deleteMenu = deleteMenu;
    window.setDeadline = setDeadline;
    window.submitOrder = submitOrder;
    window.startEditOrder = startEditOrder;
    window.cancelEdit = cancelEdit;
    window.deleteOrder = deleteOrder;
    window.resetAllData = resetAllData;

  </script>
</body>
</html>
