<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실시간 광림청장 애찬 메뉴 선택!</title>
  <!-- Google Fonts 구글 폰트 적용 -->
  <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #ff7b93;
      --secondary-color: #ffeb3b;
      --bg-color: #fff9f9;
      --card-bg: #ffffff;
      --text-color: #4a4a4a;
      --accent-color: #4ecdc4;
      --edit-color: #ff9f43;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans KR', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 10px;
    }

    /* 모바일 최적화 컨테이너 */
    .app-container {
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      border-radius: 30px;
      box-shadow: 0 15px 30px rgba(255, 123, 147, 0.15);
      overflow: hidden;
      border: 4px solid #ffe3e8;
      position: relative;
    }

    /* 1. 헤더 (사진.jpg 배경 및 웰컴 메시지) */
    .hero-header {
      width: 100%;
      height: 220px;
      background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.4)), url('사진.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      color: #fff;
    }

    .hero-header h1 {
      font-family: 'Gamja Flower', cursive;
      font-size: 2.2rem;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
      word-break: keep-all;
      line-height: 1.3;
      color: var(--secondary-color);
    }

    .hero-header p {
      font-size: 1.1rem;
      font-weight: 700;
      margin-top: 10px;
      text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.8);
      background: rgba(255, 123, 147, 0.8);
      padding: 5px 15px;
      border-radius: 20px;
    }

    .account-copy {
      margin-top: 10px;
      background: rgba(255, 255, 255, 0.95);
      color: var(--primary-color);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid rgba(255, 123, 147, 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .account-copy:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(255, 123, 147, 0.18);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      background: rgba(74, 74, 74, 0.95);
      color: white;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .aggregation-card {
      border: 1px solid #ffe3e8;
      border-radius: 16px;
      background: #fffdfd;
      overflow: hidden;
    }

    .aggregation-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: linear-gradient(90deg, #fff4f6, #fffdfd);
      cursor: pointer;
      font-weight: 700;
      color: var(--primary-color);
    }

    .aggregation-body {
      display: none;
      padding: 10px 12px 12px;
    }

    .aggregation-body.open {
      display: block;
    }

    .aggregation-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .aggregation-table th {
      background: #ffe3e8;
      color: var(--text-color);
      padding: 8px 6px;
    }

    .aggregation-table td {
      padding: 8px 6px;
      border-bottom: 1px solid #f8e4e8;
    }

    .aggregation-table tfoot td {
      background: #fff4f6;
      font-weight: 700;
      color: var(--primary-color);
    }

    /* 섹션 스타일 */
    .section {
      padding: 20px;
      border-bottom: 2px dashed #ffe3e8;
    }

    .section-title {
      font-size: 1.25rem;
      font-weight: 900;
      color: var(--primary-color);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .download-chart-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 50%;
      background: #fff4f6;
      color: var(--primary-color);
      cursor: pointer;
      padding: 0;
    }

    .download-chart-btn:hover {
      background: #ffe3e8;
    }

    .orders-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .orders-toggle-btn {
      display: none;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 999px;
      padding: 6px 10px;
      background: #fff4f6;
      color: var(--primary-color);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
    }

    .orders-toggle-btn.visible {
      display: inline-flex;
    }

    .orders-table-shell.collapsed .table-container {
      display: none;
    }

    .chat-panel {
      display: none;
      margin-top: 12px;
      border: 1px solid #ffe3e8;
      border-radius: 16px;
      background: #fffdfd;
      overflow: hidden;
    }

    .chat-panel.active {
      display: block;
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: linear-gradient(90deg, #fff4f6, #fffdfd);
      font-weight: 700;
      color: var(--primary-color);
    }

    .chat-actions {
      display: flex;
      gap: 6px;
    }

    .chat-action-btn {
      border: none;
      background: #fff;
      color: var(--primary-color);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
    }

    .chat-messages {
      min-height: 220px;
      max-height: 280px;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: linear-gradient(180deg, #fff, #fffafc);
    }

    .chat-message {
      position: relative;
      padding: 10px 12px;
      border-radius: 14px;
      background: linear-gradient(135deg, #fff7fa, #ffffff);
      border: 1px solid #ffe3e8;
      box-shadow: 0 4px 12px rgba(255, 123, 147, 0.08);
      font-size: 0.92rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .chat-message strong {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      color: var(--primary-color);
      font-size: 0.8rem;
    }

    .chat-time {
      color: #999;
      font-size: 0.72rem;
      font-weight: 500;
    }

    .chat-delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      border: none;
      background: transparent;
      color: #ff7b93;
      cursor: pointer;
      font-size: 0.85rem;
      line-height: 1;
    }

    .chat-empty {
      color: #999;
      font-size: 0.9rem;
      text-align: center;
      padding: 16px 0;
    }

    .chat-input-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #ffe3e8;
      background: #fff;
    }

    .chat-author-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .chat-author-input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ffd1d9;
      border-radius: 999px;
      font-size: 0.95rem;
    }

    .chat-input {
      width: 100%;
      min-height: 84px;
      padding: 12px 14px;
      border: 1px solid #ffd1d9;
      border-radius: 14px;
      font-size: 0.95rem;
      resize: vertical;
    }

    .chat-send-btn {
      width: 100%;
      padding: 10px 14px;
      border-radius: 999px;
      box-shadow: none;
    }

    /* 공통 폼 스타일 */
    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 5px;
      color: #888;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #ffd1d9;
      border-radius: 15px;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
      background-color: #fffcfc;
    }

    input:focus, select:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 8px rgba(255, 123, 147, 0.2);
    }

    .btn {
      width: 100%;
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 15px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, background-color 0.2s;
      box-shadow: 0 5px 10px rgba(255, 123, 147, 0.3);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: var(--accent-color);
      box-shadow: 0 5px 10px rgba(78, 205, 196, 0.3);
    }

    /* 관리자 권한 토글 버튼 */
    .admin-toggle {
      background: #f1f1f1;
      color: #666;
      text-align: center;
      padding: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 700;
    }

    .admin-panel {
      display: none;
      background: #fff5f6;
      border-radius: 15px;
      padding: 15px;
      margin-top: 10px;
      border: 2px solid #ffd1d9;
    }

    .admin-auth-box {
      display: none;
      margin-top: 10px;
      padding: 12px;
      border: 2px solid #ffd1d9;
      border-radius: 15px;
      background: #fff;
    }

    .menu-item-row {
      display: flex;
      gap: 5px;
      margin-bottom: 5px;
    }

    .order-item-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid #ffe3e8;
      border-radius: 14px;
      background: #fffdfd;
    }

    .order-item-row .menu-label {
      flex: 1;
      font-weight: 700;
      color: var(--text-color);
    }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .qty-btn {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 50%;
      background: var(--primary-color);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: none;
      padding: 0;
    }

    .qty-value {
      min-width: 24px;
      text-align: center;
      font-weight: 700;
      color: var(--primary-color);
    }

    /* 마감 타이머 */
    .timer-display {
      background: #fff;
      border: 2px solid var(--primary-color);
      padding: 8px;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
      color: var(--primary-color);
      margin-bottom: 10px;
    }

    /* 취합 테이블 */
    .table-container {
      overflow-x: auto;
      margin-top: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      text-align: center;
    }

    th {
      background-color: #ffd1d9;
      color: var(--text-color);
      font-weight: 700;
      padding: 10px 4px;
    }

    td {
      padding: 10px 4px;
      border-bottom: 1px solid #ffe3e8;
    }

    tr:nth-child(even) td {
      background-color: #fffcfc;
    }

    .total-row {
      background-color: #ffe3e8 !important;
      font-weight: bold;
      color: var(--primary-color);
    }

    /* 수정/삭제 아이콘 버튼 */
    .action-btn {
      border: none;
      background: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 5px;
      transition: transform 0.1s;
    }

    .action-btn:active {
      transform: scale(1.3);
    }

    /* 폭죽용 캔버스 */
    #confettiCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 999;
    }

    @media (max-width: 360px) {
      .hero-header h1 { font-size: 1.8rem; }
      .roulette-container { width: 240px; height: 240px; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- 1. 헤더 -->
    <div class="hero-header">
      <h1>메뉴를 선택해주세요.<br>늘 기대가 가득한 애찬!</h1>
      <p>미리 정산하면 픽업이 빨라요~</p>
      <div class="account-copy" onclick="copyAccountNumber()" title="클릭하면 계좌번호가 복사됩니다">카카오 3333-09-3143695 김성현</div>
    </div>

    <!-- 관리자 모드 토글 -->
    <div class="admin-toggle" onclick="toggleAdminPanel()">⚙️ 관리자 설정 열기/닫기</div>

    <div class="admin-auth-box" id="adminAuthBox">
      <label style="display:block; margin-bottom:8px; font-weight:700; color:#666;">🔐 관리자 비밀번호</label>
      <input type="password" id="adminPassword" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter') checkAdminAccess()">
      <button class="btn btn-secondary" onclick="checkAdminAccess()" style="margin-top:8px; padding:8px; font-size:0.9rem;">확인</button>
    </div>
    
    <!-- 3. 관리자 권한 섹션 -->
    <div class="admin-panel" id="adminPanel">
      <div class="section-title">🛠️ 관리자 설정</div>
      
      <div class="form-group">
        <label>⏱️ 주문 마감 시간 설정</label>
        <input type="datetime-local" id="deadlineTime" onchange="setDeadline()">
      </div>

      <div class="form-group">
        <label>➕ 신규 메뉴 추가</label>
        <div class="menu-item-row">
          <input type="text" id="newMenuName" placeholder="메뉴명 (예: 햄버거)">
          <input type="number" id="newMenuPrice" placeholder="가격 (원)" style="width: 120px;">
        </div>
        <button class="btn btn-secondary" onclick="addNewMenu()" style="padding: 8px; font-size: 0.9rem;">메뉴 추가</button>
      </div>

      <div class="form-group" style="margin-top: 15px;">
        <label>📋 등록된 메뉴 목록 (가격 수정 가능)</label>
        <div id="adminMenuList"></div>
      </div>

      <div class="form-group" style="margin-top: 15px;">
        <label>📦 주문 집계 현황</label>
        <div class="aggregation-card">
          <div class="aggregation-header" onclick="toggleAggregationPanel()">
            <span>메뉴별 집계 보기</span>
            <span id="aggregationToggleIcon">▾</span>
          </div>
          <div class="aggregation-body" id="aggregationBody">
            <div class="table-container" style="margin-top:0;">
              <table class="aggregation-table">
                <thead>
                  <tr>
                    <th>메뉴</th>
                    <th>수량</th>
                    <th>금액</th>
                  </tr>
                </thead>
                <tbody id="aggregationTableBody"></tbody>
                <tfoot>
                  <tr>
                    <td>합계</td>
                    <td id="aggregationTotalQty">0</td>
                    <td id="aggregationTotalAmount">0원</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </div>
      </div>
      
      <button class="btn btn-secondary" onclick="resetAllData()" style="background:#ff4757; margin-top:10px;">데이터 전체 초기화 🧹</button>
    </div>

    <!-- 주문 마감 시간 표시기 -->
    <div class="section" style="padding-bottom: 0;">
      <div class="timer-display" id="timerDisplay">⏳ 주문 진행 중... 원하시는 메뉴를 담아주세요!</div>
    </div>

    <!-- 4. 주문자 입력 섹션 -->
    <div class="section" id="orderFormSection">
      <div class="section-title" id="formTitle">✏️ 메뉴 주문하기</div>
      
      <div class="form-group">
        <label>주문자 이름</label>
        <input type="text" id="ordererName" placeholder="이름을 입력해 주세요" oninput="this.value=this.value.replace(/\s/g,'')" autocomplete="off">
      </div>

      <div class="form-group">
        <label>메뉴 선택</label>
        <div id="orderItemsContainer"></div>
      </div>

      <div style="display: flex; gap: 8px;">
        <button class="btn" id="submitBtn" onclick="submitOrder()" style="flex: 1;">주문 추가하기 🥳</button>
        <button class="btn" id="cancelEditBtn" onclick="cancelEdit()" style="display: none; background: #a4b0be; box-shadow: 0 5px 10px rgba(164,176,190,0.3); width: 80px;">취소</button>
      </div>
    </div>

    <!-- 6. 주문 현황 및 취합 테이블 -->
    <div class="section">
      <div class="section-title">
        <button type="button" class="download-chart-btn" onclick="downloadOrdersExcel()" title="엑셀로 다운로드" aria-label="엑셀로 다운로드">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v18h18"></path>
            <path d="M7 14l4-4 4 4"></path>
            <path d="M11 10v8"></path>
            <path d="M6 18h10"></path>
          </svg>
        </button>
        <span>📊 실시간 주문 현황</span>
        <button type="button" class="orders-toggle-btn" id="ordersToggleBtn" onclick="toggleOrdersTable()">접기</button>
      </div>
      <div class="orders-table-shell" id="ordersTableShell">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>주문자</th>
                <th>메뉴</th>
                <th>단가</th>
                <th>수량</th>
                <th>금액</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="orderTableBody">
              <!-- 주문 데이터 동적 삽입 -->
            </tbody>
            <tfoot>
              <tr class="total-row" id="totalRow">
                <td colspan="3">합계</td>
                <td id="totalQty">0</td>
                <td id="totalAmount" colspan="2">0원</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>

      <div class="chat-panel" id="chatPanel">
        <div class="chat-header">
          <span>💬 실시간 채팅</span>
          <div class="chat-actions">
            <button type="button" class="chat-action-btn" onclick="clearChatMessages()">초기화</button>
          </div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
          <div class="chat-author-row">
            <input type="text" class="chat-author-input" id="chatAuthorInput" placeholder="작성자 이름을 입력하세요" autocomplete="off">
          </div>
          <textarea class="chat-input" id="chatInput" placeholder="메시지를 입력하세요"></textarea>
          <button type="button" class="btn chat-send-btn" onclick="sendChatMessage()">전송</button>
        </div>
      </div>
    </div>

  </div>

  <div class="toast" id="toastMessage">복사 완료</div>

  <!-- Firebase 및 앱 로직 스크립트 -->
  <script type="module">
    // Firebase SDK CDN 가져오기 (v10)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // ----------------- [ 중요! 여기에 복사한 Firebase 설정을 붙여넣으세요 ] -----------------
    const firebaseConfig = {
      apiKey: "AIzaSyBusyoLc5Tg1J5XsTXYUBUytbD2ZlPQfro",
      authDomain: "kl3040-lunch.firebaseapp.com",
      databaseURL: "https://kl3040-lunch-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kl3040-lunch",
      storageBucket: "kl3040-lunch.firebasestorage.app",
      messagingSenderId: "25628257685",
      appId: "1:25628257685:web:5e71c24fdded2d0da05a9c",
      measurementId: "G-BNF4JKKYSG"
    };
    // ----------------------------------------------------------------------------------

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 같은 Firebase 프로젝트를 써도 서로 다른 데이터 경로를 사용하도록 분리
    const appNamespace = (window.__APP_NAMESPACE__ || new URLSearchParams(window.location.search).get('ns') || 'coffeelottery-dev').trim();
    function dbPath(...segments) {
      return [appNamespace, ...segments].filter(Boolean).join('/');
    }

    // --- 앱 상태 전역 변수 ---
    let menus = [];
    let orders = [];
    let deadlineStr = null;
    let timerInterval = null;
    let editingOrderId = null;
    let chatMessages = [];

    // --- 데이터 실시간 동기화 (Firebase -> Client) ---

    // 1. 메뉴 목록 실시간 감지 및 최초 초기화
    const menusRef = ref(db, dbPath('menus'));
    onValue(menusRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        // DB에 메뉴 데이터가 아예 없을 때 디폴트 데이터 주입
        const defaultMenus = {
          1: { id: 1, name: "일반김밥", price: 3500 },
          2: { id: 2, name: "돈까스김밥", price: 5500 },
          3: { id: 3, name: "치킨마요", price: 3900 },
          4: { id: 4, name: "왕치킨마요", price: 5600 }
        };
        set(menusRef, defaultMenus);
        menus = Object.values(defaultMenus);
      } else {
        menus = Object.values(data);
      }
      renderMenuOptions();
      renderAdminMenuList();
      renderOrders(); 
    });

    // 2. 주문 내역 실시간 감지
    const ordersRef = ref(db, dbPath('orders'));
    onValue(ordersRef, (snapshot) => {
      const data = snapshot.val();
      if (data) {
        orders = Object.keys(data).map(key => ({ id: key, ...data[key] }));
      } else {
        orders = [];
      }
      renderOrders();
    });

    // 3. 마감 시간 실시간 감지
    const deadlineRef = ref(db, dbPath('deadline'));
    onValue(deadlineRef, (snapshot) => {
      deadlineStr = snapshot.val();
      if (deadlineStr) {
        document.getElementById('deadlineTime').value = deadlineStr;
        startTimer();
      } else {
        document.getElementById('deadlineTime').value = '';
        document.getElementById('timerDisplay').innerHTML = "⏳ 주문 진행 중... 원하시는 메뉴를 담아주세요!";
        document.getElementById('timerDisplay').style.background = "#fff";
        document.getElementById('timerDisplay').style.color = "var(--primary-color)";
        if(timerInterval) clearInterval(timerInterval);
      }
      updateOrderFormState();
    });

    const chatMessagesRef = ref(db, dbPath('chatMessages'));
    onValue(chatMessagesRef, (snapshot) => {
      const data = snapshot.val();
      if (data) {
        chatMessages = Object.keys(data).map(key => ({ id: key, ...data[key] }));
      } else {
        chatMessages = [];
      }
      renderChatMessages();
    });

    // --- UI 랜더링 함수들 ---

    function toggleAdminPanel() {
      const panel = document.getElementById('adminPanel');
      const authBox = document.getElementById('adminAuthBox');
      const isOpen = panel.style.display === 'block';

      panel.style.display = 'none';
      authBox.style.display = isOpen ? 'none' : 'block';
      document.getElementById('adminPassword').value = '';
    }

    function checkAdminAccess() {
      const password = document.getElementById('adminPassword').value;
      const correctPassword = '3040';

      if (password === correctPassword) {
        document.getElementById('adminAuthBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
      } else {
        alert('관리자 비밀번호가 올바르지 않습니다.');
      }
    }

    function renderMenuOptions() {
      const container = document.getElementById('orderItemsContainer');
      if (!container) return;

      container.innerHTML = '';
      menus.forEach((menu) => {
        const row = document.createElement('div');
        row.className = 'order-item-row';
        row.innerHTML = `
          <div class="menu-label">${menu.name} (${menu.price.toLocaleString()}원)</div>
          <div class="qty-control">
            <button type="button" class="qty-btn" data-menu-id="${menu.id}" data-delta="-1">−</button>
            <div class="qty-value" id="qty-${menu.id}">0</div>
            <button type="button" class="qty-btn" data-menu-id="${menu.id}" data-delta="1">＋</button>
          </div>
        `;
        container.appendChild(row);
      });

      container.querySelectorAll('.qty-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const menuId = parseInt(btn.getAttribute('data-menu-id'), 10);
          const delta = parseInt(btn.getAttribute('data-delta'), 10);
          updateMenuQty(menuId, delta);
        });
      });
    }

    function updateMenuQty(menuId, delta) {
      const qtyEl = document.getElementById(`qty-${menuId}`);
      if (!qtyEl) return;
      const currentQty = parseInt(qtyEl.textContent, 10) || 0;
      const nextQty = Math.max(0, currentQty + delta);
      qtyEl.textContent = nextQty;
    }

    function resetOrderItemRows() {
      renderMenuOptions();
    }

    function getSelectedOrderItems() {
      return menus
        .map((menu) => {
          const qtyEl = document.getElementById(`qty-${menu.id}`);
          const qty = parseInt(qtyEl?.textContent || '0', 10);
          return { menuId: menu.id, qty };
        })
        .filter(item => item.qty > 0);
    }

    function renderAdminMenuList() {
      const container = document.getElementById('adminMenuList');
      container.innerHTML = '';
      menus.forEach((menu) => {
        const div = document.createElement('div');
        div.className = 'menu-item-row';
        div.innerHTML = `
          <input type="text" value="${menu.name}" onchange="updateMenuName(${menu.id}, this.value)" style="flex:2; padding: 6px 10px;">
          <input type="number" value="${menu.price}" onchange="updateMenuPrice(${menu.id}, this.value)" style="flex:1; padding: 6px 10px;">
          <button class="btn btn-secondary" onclick="deleteMenu(${menu.id})" style="width:50px; padding:6px; background:#ff4757;">삭제</button>
        `;
        container.appendChild(div);
      });
    }

    function isOrderClosed() {
      if (!deadlineStr) return false;
      const now = new Date();
      const deadline = new Date(deadlineStr);
      if (isNaN(deadline.getTime())) return false;
      return now >= deadline;
    }

    function updateOrderFormState() {
      const isClosed = isOrderClosed();
      const nameInput = document.getElementById('ordererName');
      const qtyButtons = document.querySelectorAll('.qty-btn');
      const submitBtn = document.getElementById('submitBtn');
      const cancelEditBtn = document.getElementById('cancelEditBtn');

      nameInput.disabled = isClosed;
      qtyButtons.forEach(btn => btn.disabled = isClosed);
      submitBtn.disabled = isClosed;
      cancelEditBtn.disabled = isClosed;

      if (isClosed) {
        if (editingOrderId !== null) {
          cancelEdit();
        }
        submitBtn.textContent = "주문 마감";
        submitBtn.style.background = "#95a5a6";
        submitBtn.style.boxShadow = "none";
        cancelEditBtn.style.display = "none";
      } else if (editingOrderId !== null) {
        submitBtn.textContent = "주문 수정 완료 💾";
        submitBtn.style.background = "var(--edit-color)";
        submitBtn.style.boxShadow = "0 5px 10px rgba(255, 159, 67, 0.3)";
      } else {
        submitBtn.textContent = "주문 추가하기 🥳";
        submitBtn.style.background = "var(--primary-color)";
        submitBtn.style.boxShadow = "0 5px 10px rgba(255, 123, 147, 0.3)";
      }
      updateOrdersSectionState();
    }

    function toggleOrdersTable() {
      const shell = document.getElementById('ordersTableShell');
      const toggleBtn = document.getElementById('ordersToggleBtn');
      if (!shell || !toggleBtn) return;
      const isCollapsed = shell.classList.toggle('collapsed');
      toggleBtn.textContent = isCollapsed ? '펼치기' : '접기';
      toggleBtn.setAttribute('aria-expanded', String(!isCollapsed));
    }

    function updateOrdersSectionState() {
      const shell = document.getElementById('ordersTableShell');
      const toggleBtn = document.getElementById('ordersToggleBtn');
      const chatPanel = document.getElementById('chatPanel');
      const isClosed = isOrderClosed();

      if (!shell || !toggleBtn || !chatPanel) return;

      if (isClosed) {
        shell.classList.add('collapsed');
        toggleBtn.classList.add('visible');
        toggleBtn.textContent = '펼치기';
        toggleBtn.setAttribute('aria-expanded', 'false');
        chatPanel.classList.add('active');
      } else {
        shell.classList.remove('collapsed');
        toggleBtn.classList.remove('visible');
        chatPanel.classList.remove('active');
      }
    }

    function renderOrders() {
      const tbody = document.getElementById('orderTableBody');
      tbody.innerHTML = '';

      let totalQty = 0;
      let totalAmt = 0;
      const isClosed = isOrderClosed();
      const aggMap = new Map();

      orders.forEach(order => {
        const menu = menus.find(m => m.id === parseInt(order.drinkId)) || { name: '삭제된 메뉴', price: 0 };
        const sumPrice = menu.price * order.qty;

        totalQty += order.qty;
        totalAmt += sumPrice;

        const aggKey = menu.name;
        if (!aggMap.has(aggKey)) {
          aggMap.set(aggKey, { name: menu.name, qty: 0, amount: 0 });
        }
        const aggItem = aggMap.get(aggKey);
        aggItem.qty += order.qty;
        aggItem.amount += sumPrice;

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>${order.name}</strong></td>
          <td>${menu.name}</td>
          <td>${menu.price.toLocaleString()}원</td>
          <td>${order.qty}</td>
          <td><strong>${sumPrice.toLocaleString()}원</strong></td>
          <td>
            ${isClosed ? '<button class="action-btn" disabled title="주문 마감으로 수정 불가">✏️</button>' : `<button class="action-btn" onclick="startEditOrder('${order.id}')" title="수정">✏️</button>`}
            ${isClosed ? '<button class="action-btn" disabled title="주문 마감으로 삭제 불가">❌</button>' : `<button class="action-btn" onclick="deleteOrder('${order.id}')" title="삭제">❌</button>`}
          </td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('totalQty').textContent = totalQty;
      document.getElementById('totalAmount').textContent = totalAmt.toLocaleString() + '원';

      const aggBody = document.getElementById('aggregationTableBody');
      aggBody.innerHTML = '';
      let aggTotalQty = 0;
      let aggTotalAmount = 0;
      aggMap.forEach((item) => {
        aggTotalQty += item.qty;
        aggTotalAmount += item.amount;
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.name}</td>
          <td>${item.qty}</td>
          <td>${item.amount.toLocaleString()}원</td>
        `;
        aggBody.appendChild(row);
      });
      document.getElementById('aggregationTotalQty').textContent = aggTotalQty;
      document.getElementById('aggregationTotalAmount').textContent = aggTotalAmount.toLocaleString() + '원';

      updateOrderFormState();
    }

    function renderChatMessages() {
      const container = document.getElementById('chatMessages');
      if (!container) return;

      if (!chatMessages.length) {
        container.innerHTML = '<div class="chat-empty">아직 채팅 메시지가 없습니다.</div>';
        return;
      }

      container.innerHTML = chatMessages.map(message => {
        const time = message.timestamp ? new Date(message.timestamp).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) : '';
        return `
          <div class="chat-message">
            <button type="button" class="chat-delete-btn" onclick="deleteChatMessage('${message.id}')" title="삭제">✕</button>
            <strong>${message.sender || '익명'}<span class="chat-time">${time ? ' · ' + time : ''}</span></strong>
            <div>${message.text || ''}</div>
          </div>
        `;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    function sendChatMessage() {
      if (!isOrderClosed()) return;

      const input = document.getElementById('chatInput');
      const authorInput = document.getElementById('chatAuthorInput');
      const sender = (authorInput?.value || '').replace(/\s/g, '').trim() || '익명';
      const text = input.value.trim();
      if (!text) return;
      if (!authorInput?.value.trim()) {
        alert('작성자 이름을 입력해주세요.');
        authorInput?.focus();
        return;
      }

      push(chatMessagesRef, {
        sender,
        text,
        timestamp: Date.now()
      });
      input.value = '';
      authorInput.value = '';
    }

    function deleteChatMessage(messageId) {
      if (!messageId) return;
      remove(ref(db, dbPath('chatMessages', String(messageId))));
    }

    function clearChatMessages() {
      if (!confirm('채팅 내역을 모두 초기화하시겠습니까?')) return;
      set(chatMessagesRef, null);
    }


    // --- 메뉴 관리 DB 전송 함수 ---

    function addNewMenu() {
      const nameInput = document.getElementById('newMenuName');
      const priceInput = document.getElementById('newMenuPrice');
      const name = nameInput.value.trim();
      const price = parseInt(priceInput.value);

      if(!name || isNaN(price)) {
        alert('올바른 메뉴명과 가격을 입력해 주세요.');
        return;
      }

      const newId = menus.length > 0 ? Math.max(...menus.map(m => m.id)) + 1 : 1;
      set(ref(db, dbPath('menus', String(newId))), { id: newId, name, price });

      nameInput.value = '';
      priceInput.value = '';
    }

    function updateMenuName(id, newName) {
      update(ref(db, dbPath('menus', String(id))), { name: newName });
    }

    function updateMenuPrice(id, newPrice) {
      const price = parseInt(newPrice) || 0;
      update(ref(db, dbPath('menus', String(id))), { price: price });
    }

    function deleteMenu(id) {
      remove(ref(db, dbPath('menus', String(id))));
    }


    // --- 마감 시간 처리 ---

    function setDeadline() {
      const timeVal = document.getElementById('deadlineTime').value;
      set(ref(db, dbPath('deadline')), timeVal);
    }

    function startTimer() {
      if(timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 1000);
      updateTimer();
    }

    function updateTimer() {
      if(!deadlineStr) return;
      const now = new Date();
      const deadline = new Date(deadlineStr);
      const display = document.getElementById('timerDisplay');

      if (isNaN(deadline.getTime())) {
        display.innerHTML = "⏳ 주문 마감 시간을 설정해주세요!";
        display.style.background = "#fff";
        display.style.color = "var(--primary-color)";
        return;
      }

      if (deadline < now) {
        clearInterval(timerInterval);
        display.innerHTML = "🚨 주문이 마감되었습니다! 주문 정리를 마무리해주세요!";
        display.style.background = "#ff4757";
        display.style.color = "#fff";
        return;
      }

      const diff = deadline - now;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const mins = Math.floor((diff / (1000 * 60)) % 60);
      const secs = Math.floor((diff / 1000) % 60);

      display.innerHTML = `⏱️ 마감까지 남은 시간: <strong>${days}일 ${hours}시간 ${mins}분 ${secs}초</strong>`;
      display.style.background = "#fff9db";
      display.style.color = "#f59f00";
    }


    // --- 주문 등록 및 수정/삭제 DB 반영 ---

    function submitOrder() {
      if (isOrderClosed()) {
        alert("주문 마감 시간이 지나 주문 변경이 불가능합니다.");
        return;
      }

      const nameInput = document.getElementById('ordererName');
      const name = nameInput.value.replace(/\s/g, '').trim();
      const selectedItems = getSelectedOrderItems();

      if(!name) {
        alert('주문자 이름을 입력해주세요!');
        return;
      }

      if (selectedItems.length === 0) {
        alert('메뉴를 하나 이상 선택해주세요!');
        return;
      }

      if (editingOrderId === null) {
        const hasSameName = orders.some(order => (order.name || '').trim().toLowerCase() === name.toLowerCase());
        if (hasSameName) {
          const shouldContinue = confirm('동일 이름이 존재합니다. 그래도 진행하시겠습니까?');
          if (!shouldContinue) {
            nameInput.focus();
            nameInput.select();
            return;
          }
        }
      }

      if (editingOrderId !== null) {
        // 수정 모드는 첫 번째 선택 항목만 반영하도록 유지
        const item = selectedItems[0];
        update(ref(db, dbPath('orders', String(editingOrderId))), {
          name: name,
          drinkId: item.menuId,
          qty: item.qty
        });
        cancelEdit();
      } else {
        selectedItems.forEach(item => {
          const existingOrder = orders.find(o => o.name === name && o.drinkId === item.menuId);
          if(existingOrder) {
            update(ref(db, dbPath('orders', String(existingOrder.id))), {
              qty: existingOrder.qty + item.qty
            });
          } else {
            const newOrderRef = push(ref(db, dbPath('orders')));
            set(newOrderRef, {
              name,
              drinkId: item.menuId,
              qty: item.qty
            });
          }
        });
      }

      nameInput.value = '';
      resetOrderItemRows();
    }

    function startEditOrder(id) {
      if (isOrderClosed()) {
        alert("주문 마감 시간이 지나 주문 수정이 불가능합니다.");
        return;
      }

      const order = orders.find(o => o.id === id);
      if(!order) return;

      editingOrderId = id;

      resetOrderItemRows();
      document.getElementById('ordererName').value = order.name;
      const qtyEl = document.getElementById(`qty-${order.drinkId}`);
      if (qtyEl) {
        qtyEl.textContent = order.qty;
      }

      document.getElementById('formTitle').textContent = "✏️ 주문 수정하기";
      document.getElementById('submitBtn').textContent = "주문 수정 완료 💾";
      document.getElementById('submitBtn').style.background = "var(--edit-color)";
      document.getElementById('cancelEditBtn').style.display = "block";

      document.getElementById('orderFormSection').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelEdit() {
      editingOrderId = null;
      document.getElementById('ordererName').value = '';
      resetOrderItemRows();

      document.getElementById('formTitle').textContent = "✏️ 메뉴 주문하기";
      document.getElementById('submitBtn').textContent = "주문 추가하기 🥳";
      document.getElementById('submitBtn').style.background = "var(--primary-color)";
      document.getElementById('cancelEditBtn').style.display = "none";
    }

    function deleteOrder(id) {
      if (isOrderClosed()) {
        alert("주문 마감 시간이 지나 주문 삭제가 불가능합니다.");
        return;
      }

      if(confirm("해당 주문을 삭제하시겠습니까?")) {
        remove(ref(db, dbPath('orders', String(id))));
        if (editingOrderId === id) {
          cancelEdit();
        }
      }
    }

    function downloadOrdersExcel() {
      const rows = [['주문자', '메뉴', '단가', '수량', '금액']];
      let totalQty = 0;
      let totalAmount = 0;

      orders.forEach(order => {
        const menu = menus.find(m => m.id === parseInt(order.drinkId, 10)) || { name: '삭제된 메뉴', price: 0 };
        const sumPrice = menu.price * order.qty;
        totalQty += order.qty;
        totalAmount += sumPrice;
        rows.push([order.name, menu.name, `${menu.price.toLocaleString()}원`, order.qty, `${sumPrice.toLocaleString()}원`]);
      });

      rows.push([]);
      rows.push(['합계', '', '', totalQty, `${totalAmount.toLocaleString()}원`]);

      const csvContent = rows.map(row => row.map(value => `"${String(value).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob(['\uFEFF' + csvContent], { type: 'application/vnd.ms-excel;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = '실시간_주문현황.xls';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);
    }

    function copyAccountNumber() {
      const accountText = '카카오 3333-09-3143695 김성현';
      navigator.clipboard.writeText(accountText).then(() => {
        showToast('계좌번호가 복사되었습니다.');
      }).catch(() => {
        showToast('복사에 실패했습니다.');
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toastMessage');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(showToast.timeoutId);
      showToast.timeoutId = setTimeout(() => {
        toast.classList.remove('show');
      }, 1800);
    }

    function toggleAggregationPanel() {
      const body = document.getElementById('aggregationBody');
      const icon = document.getElementById('aggregationToggleIcon');
      const isOpen = body.classList.toggle('open');
      icon.textContent = isOpen ? '▴' : '▾';
    }

    // 전체 초기화 (새 게임 시작 시)
    function resetAllData() {
      if(confirm("모든 주문, 마감 시간, 메뉴를 기본값으로 초기화하시겠습니까?")) {
        const defaultMenus = {
          1: { id: 1, name: "일반김밥", price: 3500 },
          2: { id: 2, name: "돈까스김밥", price: 5500 },
          3: { id: 3, name: "치킨마요", price: 3900 },
          4: { id: 4, name: "왕치킨마요", price: 5600 }
        };

        set(ref(db, dbPath('menus')), defaultMenus);
        remove(ref(db, dbPath('orders')));
        remove(ref(db, dbPath('deadline')));
        alert("기본 메뉴와 데이터가 초기화되었습니다!");
      }
    }


    // --- HTML 엘리먼트 onclick 연동을 위한 전역 스코프 바인딩 ---
    window.toggleAdminPanel = toggleAdminPanel;
    window.checkAdminAccess = checkAdminAccess;
    window.downloadOrdersExcel = downloadOrdersExcel;
    window.toggleOrdersTable = toggleOrdersTable;
    window.sendChatMessage = sendChatMessage;
    window.deleteChatMessage = deleteChatMessage;
    window.clearChatMessages = clearChatMessages;
    window.copyAccountNumber = copyAccountNumber;
    window.toggleAggregationPanel = toggleAggregationPanel;
    window.addNewMenu = addNewMenu;
